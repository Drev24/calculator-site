<!DOCTYPE html>
<html>
<head>
  <title>Tip Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Tip Calculator</h1>

<input type="number" id="bill" placeholder="Bill Amount">
<input type="number" id="tip" placeholder="Tip %">
<input type="number" id="people" placeholder="Number of People">

<br><br>

<button onclick="calculate()">Calculate</button>

<br><br>

<div id="result"></div>

<script>
function calculate() {
  let bill = parseFloat(document.getElementById("bill").value);
  let tip = parseFloat(document.getElementById("tip").value);
  let people = parseInt(document.getElementById("people").value);

  if (!bill || !tip || !people) {
    document.getElementById("result").innerHTML = "Please fill all fields.";
    return;
  }

  let tipAmount = bill * (tip / 100);
  let total = bill + tipAmount;
  let perPerson = total / people;

  document.getElementById("result").innerHTML =
    "Total: $" + total.toFixed(2) + "<br>Per Person: $" + perPerson.toFixed(2);
}
</script>

</body>
</html>
